<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drafty - MTG Draft Companion</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <script src="lib/track-animate.js" defer></script>
    <!-- Installable Webapp! -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
    <link rel="manifest" href="manifest.json">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>

<body>
    <main>
        <div class="container">
            <div id="controls">
                <fieldset>
                    <legend>Players</legend>
                    <button id="remove-player">-</button>
                    <button id="add-player">+</button>
                </fieldset>
                <fieldset>
                    <legend>Direction</legend>
                    <button id="reverse-direction">Reverse</button>
                    <button id="start-stop-direction">Start/Stop</button>
                </fieldset>
            </div>
        </div>
    </main>
</body>

</html>
