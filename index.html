<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drafty - MTG Draft Companion</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" type="module"></script>
    <script src="lib/track-animate.js" defer></script>
    <!-- Installable Webapp! -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
    <link rel="manifest" href="site.webmanifest" />
    <!-- FavIcon -->
    <meta name="apple-mobile-web-app-title" content="Drafty" />
    <link rel="icon" type="image/png" href="assets/icon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="assets/icon/favicon.svg" />
    <link rel="shortcut icon" href="assets/icon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icon/apple-touch-icon.png" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>

<body>
    <main>
        <div class="container">
            <div id="controls-wrapper">
                <div id="controls">
                    <!-- State 1: Setup - pick player count -->
                    <div id="setup-buttons">
                        <button id="remove-player" class="half left" aria-label="Remove player"><span class="side-control-label">-</span></button>
                        <button id="add-player" class="half right" aria-label="Add player"><span class="side-control-label">+</span></button>
                    </div>

                    <button id="center-control" type="button" aria-live="polite" aria-label="Confirm players">
                        <span id="center-control-content">
                            <span id="center-control-primary">8</span>
                            <span id="center-control-secondary">Confirm</span>
                        </span>
                    </button>
                </div>

                <div class="overlay" aria-hidden="true">
                    <div class="divider"></div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
